<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Family Hub">
<meta name="theme-color" content="#f7f3ea">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Family Hub</title>
<style>
:root{--bg:#f7f3ea;--panel:#fffaf0;--ink:#2b2721;--muted:#7b7164;--line:#dfd2bd;--blue:#6b8fd6;--green:#6d9d76;--yellow:#d6aa4f;--red:#d66b6b}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{border:0;border-radius:12px;background:var(--ink);color:#fff;padding:10px 14px;font-weight:700}.secondary{background:#eadfce;color:var(--ink)}
.app{min-height:100vh;padding:16px;display:grid;grid-template-rows:auto 1fr;gap:12px}header{display:flex;justify-content:space-between;align-items:center}h1{margin:0;font-size:28px}.layout{display:grid;grid-template-columns:1.5fr .8fr;grid-template-rows:1fr .45fr;gap:12px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 10px 30px rgba(63,46,26,.12)}.calendar{grid-row:1/span 2;display:grid;grid-template-rows:auto auto 1fr}.calTop{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--line)}.month{font-size:25px;font-weight:850}.week,.grid{display:grid;grid-template-columns:repeat(7,1fr)}.week{padding:8px;color:var(--muted);font-size:12px;font-weight:800;text-align:center}.grid{padding:0 10px 10px;gap:6px}.day{background:#fff;border:1px solid #ede3d4;border-radius:14px;min-height:96px;padding:7px;overflow:hidden}.other{opacity:.35}.today{outline:3px solid rgba(109,143,111,.35)}.num{font-weight:850}.pill{border-radius:8px;padding:3px 6px;font-size:12px;font-weight:750;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}.Ben{background:var(--blue)}.Wife{background:var(--green)}.Kids{background:var(--yellow);color:var(--ink)}.Family{background:var(--red)}.title{padding:13px 15px;border-bottom:1px solid var(--line);font-weight:850}.list{padding:12px;overflow:auto}.item{display:flex;gap:9px;align-items:center;background:#fff;border:1px solid #ede3d4;border-radius:13px;padding:9px;margin-bottom:8px}.item input[type=checkbox]{width:22px;height:22px}.done span{text-decoration:line-through;color:var(--muted)}.twocol{display:grid;grid-template-columns:1fr 1fr;gap:12px}.add{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}.add input{flex:1;border:1px solid var(--line);border-radius:13px;padding:10px;background:#fff;min-width:0}.small{color:var(--muted);font-size:12px}
dialog{border:0;border-radius:22px;padding:0;width:min(620px,92vw);background:var(--panel);box-shadow:0 24px 80px rgba(0,0,0,.28)}dialog::backdrop{background:rgba(0,0,0,.35)}.mh{padding:16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.form{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:5px}.full{grid-column:1/-1}label{font-size:13px;font-weight:800;color:var(--muted)}input,select,textarea{border:1px solid var(--line);border-radius:13px;padding:10px;background:#fff}.actions{padding:14px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}.hidden{display:none!important}.checks{display:flex;gap:6px;flex-wrap:wrap}.checks label{color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:99px;padding:7px 9px;font-size:12px}
@media(max-width:850px){.layout{display:flex;flex-direction:column}.calendar{min-height:680px}.twocol{grid-template-columns:1fr}.form{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app"><header><div><h1>Family Hub</h1><div class="small" id="dateLine"></div></div><div><button class="secondary" id="todayBtn">Today</button> <button id="newBtn">+ Event</button></div></header>
<main class="layout"><section class="panel calendar"><div class="calTop"><button class="secondary" id="prev">‹</button><div class="month" id="month"></div><button class="secondary" id="next">›</button></div><div class="week"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div><div class="grid" id="grid"></div></section>
<section class="panel"><div class="title">Today</div><div class="list" id="today"></div></section>
<section class="twocol"><div class="panel"><div class="title">Tasks</div><div class="list" id="tasks"></div><div class="add"><input id="taskIn" placeholder="Add a task"><button id="addTask">Add</button></div></div><div class="panel"><div class="title">Grocery List</div><div class="list" id="groceries"></div><div class="add"><input id="grocIn" placeholder="Add grocery item"><button id="addGroc">Add</button></div></div></section></main></div>
<dialog id="dlg"><div class="mh"><b id="dlgTitle">Add Event</b><button class="secondary" id="close">×</button></div><div class="form"><input type="hidden" id="eid"><div class="field full"><label>Title</label><input id="etitle"></div><div class="field"><label>Date</label><input type="date" id="edate"></div><div class="field"><label>Time</label><input type="time" id="etime"></div><div class="field"><label>Who</label><select id="ewho"><option>Family</option><option>Ben</option><option>Wife</option><option>Kids</option></select></div><div class="field"><label>Repeat</label><select id="rtype"><option value="none">Does not repeat</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select></div><div class="field rep hidden"><label>Every</label><input id="rint" type="number" min="1" value="1"></div><div class="field full weekly hidden"><label>Repeat on</label><div class="checks" id="checks"></div></div><div class="field rep hidden"><label>Ends</label><select id="rend"><option value="never">Never</option><option value="on">On date</option><option value="after">After occurrences</option></select></div><div class="field endon hidden"><label>End date</label><input type="date" id="renddate"></div><div class="field endafter hidden"><label>Occurrences</label><input type="number" min="1" id="rcount" value="10"></div><div class="field full"><label>Notes</label><textarea id="enotes"></textarea></div></div><div class="actions"><button class="secondary hidden" id="del">Delete</button><button class="secondary" id="cancel">Cancel</button><button id="save">Save</button></div></dialog>
<script>
const KEY="familyHubGitHub_v1",$=id=>document.getElementById(id),pad=n=>String(n).padStart(2,"0"),ymd=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,parse=s=>{let a=s.split("-").map(Number);return new Date(a[0],a[1]-1,a[2])};let now=new Date(),view=new Date(now.getFullYear(),now.getMonth(),1),state=JSON.parse(localStorage.getItem(KEY)||'{"events":[],"tasks":[],"groceries":[]}');function uid(){return Math.random().toString(36).slice(2)}function save(){localStorage.setItem(KEY,JSON.stringify(state));render()}function addD(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x}function addM(d,n){let x=new Date(d),day=x.getDate();x.setMonth(x.getMonth()+n);if(x.getDate()<day)x.setDate(0);return x}function addY(d,n){let x=new Date(d);x.setFullYear(x.getFullYear()+n);return x}function same(a,b){return ymd(a)==ymd(b)}function occ(ev,date){let st=parse(ev.date);if(date<st)return false;if(!ev.repeat||ev.repeat.type=="none")return same(st,date);let r=ev.repeat;if(r.endType=="on"&&r.endDate&&date>parse(r.endDate))return false;let interval=+r.interval||1;if(r.type=="weekly"){let ws=addD(st,-st.getDay()),wd=addD(date,-date.getDay()),weeks=Math.round((wd-ws)/(7*864e5));if(!(weeks>=0&&weeks%interval==0&&(r.weekdays||[st.getDay()]).includes(date.getDay())))return false}else{let cur=new Date(st),lim=1000,match=false;while(cur<=date&&lim--){if(same(cur,date)){match=true;break}cur=r.type=="daily"?addD(cur,interval):r.type=="monthly"?addM(cur,interval):addY(cur,interval)}if(!match)return false}if(r.endType=="after"){let c=0,d=new Date(st),lim=2000;while(d<=date&&lim--){let rr={...ev,repeat:{...r,endType:"never"}};if(occ(rr,d))c++;d=addD(d,1)}return c<=+r.count}return true}function evs(d){return state.events.filter(e=>occ(e,d)).sort((a,b)=>(a.time||"99").localeCompare(b.time||"99"))}function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}function render(){dateLine.textContent=now.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});month.textContent=view.toLocaleDateString(undefined,{month:"long",year:"numeric"});grid.innerHTML="";let first=addD(new Date(view.getFullYear(),view.getMonth(),1),-new Date(view.getFullYear(),view.getMonth(),1).getDay());for(let i=0;i<42;i++){let d=addD(first,i),cell=document.createElement("div");cell.className="day"+(d.getMonth()!=view.getMonth()?" other":"")+(same(d,now)?" today":"");cell.onclick=()=>openEv({date:ymd(d)});cell.innerHTML=`<div class=num>${d.getDate()}</div>`;evs(d).slice(0,4).forEach(ev=>{let p=document.createElement("div");p.className=`pill ${ev.who}`;p.textContent=(ev.time?ev.time+" ":"")+ev.title;p.onclick=e=>{e.stopPropagation();openEv(ev)};cell.appendChild(p)});grid.appendChild(cell)}today.innerHTML=evs(now).map(e=>`<div class=item><span class="pill ${e.who}">${e.time||"All day"}</span><span><b>${esc(e.title)}</b><br><span class=small>${e.who}${e.repeat&&e.repeat.type!="none"?" · repeats":""}</span></span></div>`).join("")||'<div class=small>No events today.</div>';renderItems("tasks","tasks");renderItems("groceries","groceries")}function renderItems(id,prop){$(id).innerHTML=state[prop].map((it,i)=>`<div class="item ${it.done?"done":""}"><input type=checkbox ${it.done?"checked":""} onchange="state.${prop}[${i}].done=this.checked;save()"><span>${esc(it.text)}</span><button class=secondary style="margin-left:auto" onclick="state.${prop}.splice(${i},1);save()">×</button></div>`).join("")||'<div class=small>Nothing here yet.</div>'}function openEv(ev={}){eid.value=ev.id||"";etitle.value=ev.title||"";edate.value=ev.date||ymd(now);etime.value=ev.time||"";ewho.value=ev.who||"Family";enotes.value=ev.notes||"";let r=ev.repeat||{type:"none"};rtype.value=r.type||"none";rint.value=r.interval||1;rend.value=r.endType||"never";renddate.value=r.endDate||"";rcount.value=r.count||10;[...checks.querySelectorAll("input")].forEach(cb=>cb.checked=(r.weekdays||[parse(edate.value).getDay()]).includes(+cb.value));del.classList.toggle("hidden",!ev.id);repUI();dlg.showModal()}function repUI(){let t=rtype.value;document.querySelectorAll(".rep").forEach(e=>e.classList.toggle("hidden",t=="none"));document.querySelectorAll(".weekly").forEach(e=>e.classList.toggle("hidden",t!="weekly"));document.querySelectorAll(".endon").forEach(e=>e.classList.toggle("hidden",t=="none"||rend.value!="on"));document.querySelectorAll(".endafter").forEach(e=>e.classList.toggle("hidden",t=="none"||rend.value!="after"))}["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach((d,i)=>checks.innerHTML+=`<label><input type=checkbox value=${i}> ${d}</label>`);prev.onclick=()=>{view.setMonth(view.getMonth()-1);render()};next.onclick=()=>{view.setMonth(view.getMonth()+1);render()};todayBtn.onclick=()=>{view=new Date(now.getFullYear(),now.getMonth(),1);render()};newBtn.onclick=()=>openEv({date:ymd(now)});close.onclick=cancel.onclick=()=>dlg.close();rtype.onchange=rend.onchange=repUI;save.onclick=()=>{if(!etitle.value||!edate.value)return;let r=rtype.value=="none"?{type:"none"}:{type:rtype.value,interval:+rint.value||1,weekdays:[...checks.querySelectorAll("input:checked")].map(x=>+x.value),endType:rend.value,endDate:renddate.value,count:+rcount.value||1};if(r.type=="weekly"&&!r.weekdays.length)r.weekdays=[parse(edate.value).getDay()];let ev={id:eid.value||uid(),title:etitle.value,date:edate.value,time:etime.value,who:ewho.value,notes:enotes.value,repeat:r},i=state.events.findIndex(x=>x.id==ev.id);if(i>=0)state.events[i]=ev;else state.events.push(ev);dlg.close();save()};del.onclick=()=>{state.events=state.events.filter(e=>e.id!=eid.value);dlg.close();save()};addTask.onclick=()=>{if(taskIn.value.trim()){state.tasks.push({text:taskIn.value.trim(),done:false});taskIn.value="";save()}};addGroc.onclick=()=>{if(grocIn.value.trim()){state.groceries.push({text:grocIn.value.trim(),done:false});grocIn.value="";save()}};render();
</script></body></html>
